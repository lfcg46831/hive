# Calibration-only model comparison override for US-F0-13-T15.
#
# Layer last after docker-compose.evaluation.yml. The bind-mounted organization
# keeps the T14 triage-v2 identity and selects gpt-5.4-mini only for bug triage.
# Historical experiment inputs and the normal organization source stay untouched.

services:
  api:
    environment:
      HIVE__AIGATEWAY__REAL__MODELID: "gpt-5.4-mini-2026-03-17"
      HIVE__AIGATEWAY__REAL__PRICING__VERSION: "openai-2026-07-15-gpt-5.4-mini"
      HIVE__AIGATEWAY__REAL__PRICING__MODELS__1__PROVIDERID: "openai"
      HIVE__AIGATEWAY__REAL__PRICING__MODELS__1__MODELID: "gpt-5.4-mini-2026-03-17"
      HIVE__AIGATEWAY__REAL__PRICING__MODELS__1__ALIASES__0: "gpt-5.4-mini"
      HIVE__AIGATEWAY__REAL__PRICING__MODELS__1__INPUTPRICE: "0.75"
      HIVE__AIGATEWAY__REAL__PRICING__MODELS__1__OUTPUTPRICE: "4.50"
      HIVE__AIGATEWAY__REAL__PRICING__MODELS__1__CURRENCY: "USD"
    volumes:
      - type: bind
        source: ./config/experiments/gpt-5.4-mini-prompt-recovery/organization.yaml
        target: /app/config/organizations/acme-delivery/organization.yaml
        read_only: true
