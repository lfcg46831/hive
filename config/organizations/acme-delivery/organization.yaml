organization:
  id: acme-delivery
  name: ACME Engenharia/Delivery
  root_unit: raiz
  owner:
    type: human
    ref: owner@acme.pt

prompts:
  - id: ceo-v1
    path: prompts/ceo-v1.md
  - id: engineer-v1
    path: prompts/engineer-v1.md

units:
  - id: raiz
    name: ACME
    parent: null
    leadership: ceo
  - id: engenharia
    name: Engenharia/Delivery
    parent: raiz
    leadership: delivery-lead

positions:
  - id: ceo
    name: CEO
    unit: raiz
    reports_to: null
    timezone: Europe/Lisbon
    occupant:
      type: ai-agent
      identity_prompt_ref: ceo-v1
      ai:
        provider: stub
        model: deterministic
        temperature: 0.2
        max_tokens: 1024
        max_iterations: 4
        timeout: PT30S
        processing: interactive
        fallback:
          - provider: stub
            model: deterministic-backup
        budget:
          reactive_max_eur_per_day: 5.00
          proactive_max_eur_per_day: 1.00
          total_max_eur_per_day: 6.00
          max_calls_per_hour: 60
      authority:
        can_decide: ["org.quarterly-priorities"]
  - id: delivery-lead
    name: Delivery Lead
    unit: engenharia
    reports_to: ceo
    timezone: Europe/Lisbon
    occupant:
      type: ai-agent
      identity_prompt_ref: engineer-v1
      ai:
        provider: stub
        model: deterministic
        temperature: 0.2
        max_tokens: 1024
        max_iterations: 4
        timeout: PT30S
        processing: interactive
        fallback:
          - provider: stub
            model: deterministic-backup
        budget:
          reactive_max_eur_per_day: 5.00
          proactive_max_eur_per_day: 1.00
          total_max_eur_per_day: 6.00
          max_calls_per_hour: 60
      schedule:
        - id: relatorio-diario
          cron: "0 55 17 * * MON-FRI"
          instruction: "Compilar e enviar relatorio diario ao superior"
      authority:
        can_decide: ["delivery.bug-triage"]
        overrides:
          - key: comms.external-official
            gate: human-approval
            approver: ceo
