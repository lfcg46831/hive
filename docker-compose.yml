# Base Docker Compose for a local HIVE environment (US-F0-02-T03).
#
# Scope of this task: bring up PostgreSQL and a single HIVE node so a developer
# can run the system locally. The node is the `Hive.Api` web host built from the
# root Dockerfile (US-F0-02-T01) with the runtime env-var contract from
# US-F0-02-T02; it self-seeds a one-node Akka cluster (empty SeedNodes).
#
# Deliberately layered on by later tasks, so they are kept out of this base file:
#   * US-F0-02-T04  three-node cluster via a compose override/profile.
#   * US-F0-02-T05  per-service node roles (agents/gateway/connectors/api).
#   * US-F0-02-T08  Docker health checks for PostgreSQL and HIVE nodes.
#   * US-F0-02-T09  readiness gated on mandatory configuration being loaded.
#   * US-F0-02-T10  .env.example; here local-dev values are inlined for a
#                   self-contained base.
#
# Persistence (US-F0-02-T07)
# --------------------------
# PostgreSQL writes its data into the named volume `hive-pgdata` (mounted at the
# image data dir) instead of the image's implicit anonymous volume, so the store
# survives `docker compose down` and is removed only on an explicit
# `docker compose down -v` (or `docker volume rm`). Naming it also makes the
# single backing store inspectable and portable across recreations of the
# `postgres` container. A second named volume for local logs is defined but kept
# OPTIONAL and disabled by default: both hosts log structured JSON to stdout
# (collected by Compose, see configuration.md §Logging), so there is no on-disk
# log path to persist yet; the volume and its mount are left commented, ready to
# enable if a file log sink is ever added.
#
# Network and port policy (US-F0-02-T06)
# --------------------------------------
# Services share one explicit user-defined bridge network (`hive-net`) instead of
# the implicit compose default, so the trust boundary is declared and each
# service is reachable by a stable DNS name (its `aliases`) regardless of compose
# project prefixes or service renames. Ports are published to the host ONLY where
# a developer needs them: the api HTTP/diagnostics port (8080). Everything else
# stays internal to `hive-net` — the Akka remoting/cluster port (8081) and
# PostgreSQL (5432) are reachable node-to-node by DNS but are not bound on the
# host. Overrides only ADD nodes/roles to this network; they never publish the
# internal ports (extra cluster nodes and 8081 stay private).
#
# All HIVE settings use the .NET hierarchical env-var convention (`__` separates
# sections, `__0` indexes array entries), binding onto the `Hive:*`/appsettings
# contract from §5.10 of the bible with no code change.

services:
  # PostgreSQL backing store. The same F0 database serves journal/snapshots,
  # registry, audit log, read models, budgets and scheduler idempotency; each
  # subsystem owns its own schemas and migrations. Local-dev credentials only.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    # Internal-only: HIVE nodes reach it as `postgres:5432` over `hive-net`. The
    # port is not published to the host (exposed only where necessary); for
    # ad-hoc local inspection use `docker compose exec postgres psql -U hive`.
    expose:
      - "5432"
    # Persist the data directory in the named `hive-pgdata` volume (declared
    # below) so the store survives container recreation and `compose down`; it is
    # cleared only by an explicit `compose down -v`.
    volumes:
      - hive-pgdata:/var/lib/postgresql/data
    networks:
      hive-net:
        aliases:
          - postgres

  # Single HIVE node: the Hive.Api host (default Dockerfile target). It serves
  # /health and /diagnostics on 8080 and self-seeds a one-node cluster. The
  # mandatory PostgreSQL connection string is supplied here (not baked into the
  # image) so the readiness check can be satisfied; it points at the `postgres`
  # service by its stable DNS name on `hive-net`.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__PostgreSql: "Host=postgres;Port=5432;Database=hive;Username=hive;Password=hive"
    # Only the HTTP/diagnostics port is published to the host. The Akka cluster
    # port (8081) stays internal to `hive-net`; it is declared via EXPOSE in the
    # image and reached node-to-node by DNS, never bound on the host.
    ports:
      - "8080:8080"
    expose:
      - "8081"
    networks:
      hive-net:
        aliases:
          - api
    # Optional local logs (US-F0-02-T07): the host logs structured JSON to stdout
    # (collected by Compose), so no log directory is mounted by default. To keep
    # logs on a managed volume — e.g. once a file sink exists — uncomment the
    # `hive-logs` volume below and the mount here, pointing at the sink's path:
    # volumes:
    #   - hive-logs:/var/log/hive
    depends_on:
      - postgres

# Explicit internal network shared by every service (and by the nodes added in
# the cluster/roles overrides). A user-defined bridge gives automatic DNS
# resolution by service name and by the `aliases` above, so cluster hostnames
# (`api`, `postgres`, ...) stay stable independent of the compose project name.
networks:
  hive-net:
    driver: bridge

# Named volumes. `hive-pgdata` is the durable PostgreSQL data directory (active);
# `hive-logs` is the optional local-logs volume kept disabled by default — its
# mount on the `api` service is commented out because logging currently goes to
# stdout, so no container writes to it until a file log sink is introduced.
volumes:
  hive-pgdata:
  # hive-logs:
